repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: ty
        name: ty (strict type check)
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
